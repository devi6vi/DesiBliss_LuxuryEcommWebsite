<!DOCTYPE html>
<html>
<head>
  <title>Tops - DesiBliss</title>

  <style>
    body { font-family: Poppins; background:#F9F6F2; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      padding: 40px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: #1A1A1A;
      color: white;
      font-size: 21px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
    }


    .item {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #C9A96E;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav>
  <h2>DesiBliss</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="tops.html">Tops</a>
    <a href="bottom.html">Bottoms</a>
    <a href="accessories.html">Accessories</a>
    <a href="dresses.html">Dresses</a>
    <a href="cart.html">Cart</a>
  </div>
</nav>

<h1 style="text-align:center;">Tops</h1>


<div class="grid">

    <img src="beadedjeans.jpg" width="200px">

    <button onclick="addToCart('Bottom',8999)">Add to Cart</button>

  <div class="item">
    <img src="pinkembroijeans.jpg" width="200px">

    <button onclick="addToCart('Bottom',12999)">Add to Cart</button>
  </div>

  <div class="item">

  <div class="item">
    <img src="embroiskirt.jpg" width="200px">
    <h3>Embroidered Skirt</h3>

    <button onclick="addToCart('Bottom',3999)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="repjeans2.jpg" width="200px">
    <h3>Embroidered Top</h3>
    <p>₹4,999</p>
    <button onclick="addToCart('Bottom',4999)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="denimskirt.jpg" width="200px">

  <div class="item">

  </div>

   <div class="item">

    <p>₹5,999</p>
    <button onclick="addToCart('Bottom',5999)">Add to Cart</button>
  </div>

   <div class="item">
    <img src="greenskirt.jpg" width="200px">
    <h3>Grassy Skirt</h3>
    <p>₹8,999</p>
    <button onclick="addToCart('Bottom',8999)">Add to Cart</button>
  </div>

</div>

<script>
function addToCart(name, price) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push({name, price});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}
</script>

</body>
</html>
