<!DOCTYPE html>
<html>
<head>
  <title>Cart - DesiBliss</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #F9F6F2;
      padding: 40px;
      color: #2B2B2B;
    }

    h1 {
      font-family: 'Playfair Display';
      text-align: center;
      margin-bottom: 40px;
    }

    .cart-container {
      max-width: 900px;
      margin: auto;
    }

    .cart-item {
      display: flex;
      align-items: center;
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    .cart-item img {
      width: 110px;
      height: 130px;
      object-fit: cover;
      border-radius: 10px;
      margin-right: 20px;
    }

    .details {
      flex: 1;
    }

    .details h3 {
      margin: 0;
      font-size: 18px;
    }

    .price {
      margin-top: 5px;
      font-weight: bold;
      color: #7A1F2B;
    }

    .remove-btn {
      background: #eee;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 6px;
    }

    .remove-btn:hover {
      background: #ddd;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
      text-align: right;
    }

    .checkout {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      background: #C9A96E;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
    }

    .checkout:hover {
      background: #b89655;
    }

    .empty {
      text-align: center;
      color: gray;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="cart-container">
  <h1>Your Cart</h1>

  <div id="cartItems"></div>

  <div class="total" id="total"></div>

  <button class="checkout" onclick="checkout()">Proceed to Checkout</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
  let total = 0;
  let html = "";

  if (cart.length === 0) {
    document.getElementById("cartItems").innerHTML = "<p class='empty'>Your cart is empty 🥲</p>";
    document.getElementById("total").innerText = "";
    return;
  }

  cart.forEach((item, index) => {
    total += item.price;

    html += `
      <div class="cart-item">
        <img src="${item.image}" onerror="this.src='https://via.placeholder.com/110x130?text=No+Image'">
        
        <div class="details">
          <h3>${item.name}</h3>
          <p class="price">₹${item.price}</p>
        </div>

        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cartItems").innerHTML = html;
  document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  displayCart();
}

function checkout() {
  alert("This is a demo checkout 😌");
}

displayCart();
</script>

</body>
</html>
